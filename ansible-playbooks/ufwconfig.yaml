- name: Install ufw and configure default rules
  hosts: all
  become: true
  tasks:
    - name: Install ufw
      ansible.builtin.apt:
        name: ufw
        state: present
        update_cache: yes
    - name: Deny incoming
      community.general.ufw:
        default: deny
        direction: incoming
    - name: Allow outgoing
      community.general.ufw:
        default: allow
        direction: outgoing
    - name: Allow SSH
      community.general.ufw:
        rule: allow
        name: OpenSSH
    - name: Allow port 80 (http)
      community.general.ufw:
        rule: allow
        port: "80"
        proto: tcp
    - name: Allow port 443 (https)
      community.general.ufw:
        rule: allow
        port: "443"
        proto: tcp
    - name: Reload and enable ufw
      community.general.ufw:
        state: enabled
